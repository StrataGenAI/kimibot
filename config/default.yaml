data:
  market_metadata_path: data/market_metadata.csv
  market_snapshots_path: data/market_snapshots.csv
  crypto_snapshots_path: data/crypto_snapshots.csv
  raw_storage_root: data/raw
  audit_report_path: data/audit_report.json
  feature_cache_path: data/feature_cache.csv
  trade_log_path: data/trade_log.csv
  metrics_report_path: data/metrics_report.json
  prediction_report_path: data/predictions.csv
  validation_report_path: data/validation_report.json
  model_artifact_path: models/logistic_regression.pkl
  scaler_artifact_path: models/standard_scaler.pkl
  calibrator_artifact_path: models/probability_calibrator.pkl
  training_metadata_path: models/training_metadata.json
  # source_mode selects where DataStore reads market/crypto data from.
  #   synthetic → legacy CSV fixtures under data/ (m1–m20 markets)
  #   live      → parquet under data/raw/limitless and data/raw/crypto
  # The dashboard reads what DataStore and live-sim produce, so flip this
  # to "live" to show real Limitless markets. Switch back to "synthetic"
  # for deterministic test fixtures. The dataclass default is "synthetic"
  # so old configs behave unchanged.
  source_mode: live

trading:
  initial_capital: 10000.0
  edge_threshold: 0.005
  min_edge: 0.005
  max_edge: 0.20
  min_expected_value: 0.001
  trade_cooldown_seconds: 0
  min_liquidity: 200.0
  max_position_per_market: 600.0
  max_total_exposure: 3500.0
  daily_loss_limit: 800.0
  fee_rate: 0.01
  slippage_bps: 40.0
  latency_seconds: 2.0
  price_velocity_lookback_minutes: 2
  position_size_multiplier: 0.10
  trade_cooldown_seconds: 60
  # When true, DecisionEngine skips the min_liquidity gate. Required during
  # Phase A because the Limitless public API does not expose liquidity.
  # MUST be set to false (and real orderbook-depth fetch implemented — see
  # ingestion/limitless_client.py::fetch_orderbook_depth) before enabling
  # live trading.
  paper_mode_unsafe_liquidity: true

walk_forward:
  min_resolved_markets: 5
  test_markets_per_fold: 10
  min_training_rows: 2

runtime:
  live_sim_sleep_seconds: 0.0
  log_level: INFO
  feature_schema_version: v2
  ingestion_enabled: true
  # live_sim_mode picks the code path for `python main.py live-sim`.
  #   walk_forward → train fresh folds each run (requires resolved markets)
  #   infer_only   → load existing model artifacts and skip training
  # Required when running on live markets (which have no resolved outcomes
  # yet). Switch back to walk_forward once retraining on real historical
  # resolved markets (see Option 3 / evaluate-limitless pipeline).
  live_sim_mode: infer_only

validation:
  stress_slippage_multiplier: 2.0
  stress_fee_multiplier: 2.0
  stress_liquidity_haircut: 0.5
  shuffle_seed: 17
  shuffle_repeats: 5
  holdout_test_markets: 5
  calibration_bins: 5
  calibration_tolerance: 0.15
  min_trade_count: 50
  warn_sharpe_threshold: 3.0
  warn_win_rate_threshold: 0.80
  warn_concentration_threshold: 0.30

calibration:
  method: sigmoid
  min_calibration_markets: 3
  min_calibration_rows: 4
  target_ece: 0.05

ingestion:
  limitless_rest_base_url: https://api.limitless.exchange
  limitless_ws_url: ""
  limitless_api_key: "{{LIMITLESS_API_KEY}}"
  limitless_private_key: "{{LIMITLESS_PRIVATE_KEY}}"
  graph_api_key: "{{GRAPH_API_KEY}}"
  # 60s (was 10s): discovery now paginates + filters, real work per cycle
  limitless_discovery_interval_seconds: 60
  limitless_poll_interval_seconds: 2
  crypto_rest_base_url: https://api.binance.com
  binance_api_key: "{{BINANCE_API_KEY}}"
  binance_api_secret: "{{BINANCE_API_SECRET}}"
  crypto_poll_interval_seconds: 1
  flush_interval_seconds: 5
  retry_base_delay_seconds: 1.0
  retry_max_delay_seconds: 16.0
  market_allowlist: []
  market_denylist: []
  # Limitless pagination (server enforces page size ~25).
  pagination_page_size: 25
  pagination_delay_seconds: 0.2
  pagination_max_pages: 50
  # Filter to crypto-price markets only. Modes: auto|slug_regex|off.
  # "auto" and "slug_regex" match slugs against crypto_ticker_allowlist
  # (anchored to slug start). "off" disables the filter (debug only).
  crypto_filter_mode: auto
  # Empty list → defaulted to top-~60 tickers in IngestionConfig.__post_init__.
  crypto_ticker_allowlist: []
  # Safety cap on snapshot fetches per cycle.
  max_snapshots_per_cycle: 300

audit:
  resample_frequency: 10s
  expected_market_interval_seconds: 10
  expected_crypto_interval_seconds: 5
  gap_threshold_seconds: 30
  alignment_threshold_seconds: 3
  replay_integrity_samples: 10
  price_jump_threshold: 0.3
  lifecycle_late_only_ratio: 0.5
  realistic_fill_fraction: 0.15
